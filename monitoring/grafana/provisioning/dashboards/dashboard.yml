# ============================================================
# Grafana dashboard provider — lê JSONs de /var/lib/grafana/dashboards
# ============================================================

apiVersion: 1

providers:
  - name: 'churn-api'
    orgId: 1
    folder: 'Churn API'
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    options:
      path: /var/lib/grafana/dashboards
